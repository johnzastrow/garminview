name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build Docker images and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release
      packages: write   # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/garminview-backend:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/garminview-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/garminview-frontend:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/garminview-frontend:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GarminView ${{ steps.version.outputs.tag }}
          body: |
            ## Docker images

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/garminview-backend:${{ steps.version.outputs.tag }}
            docker pull ghcr.io/${{ github.repository_owner }}/garminview-frontend:${{ steps.version.outputs.tag }}

            # Deploy with a specific version
            IMAGE_TAG=${{ steps.version.outputs.tag }} docker compose up -d
            ```

            See [docs/SETUP.md](docs/SETUP.md) for the full deployment guide.
